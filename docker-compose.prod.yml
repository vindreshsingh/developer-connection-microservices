# Production stack: all microservices + gateways.
#
# Differences from docker-compose.yml (local dev):
#   - NO mongo/redis containers — uses external managed DB (MongoDB Atlas) and
#     Redis (Upstash). Values come from the .env file in this directory.
#   - All secrets are ${VAR} references (real values live in .env, NOT git).
#   - Only the two gateways publish host ports (4000, 4020). The 11 internal
#     services are reachable ONLY on the private Docker network — never exposed
#     to the host/internet (prevents x-internal-user spoofing).
#   - restart: unless-stopped so services survive crashes and EC2 reboots.
#
# Run:  docker compose -f docker-compose.prod.yml up -d --build
#
# Required .env keys: JWT_SECRET, CSRF_SECRET, INTERNAL_SERVICE_TOKEN,
#   ENCRYPTION_KEY, MONGO_BASE, FRONTEND_URL, OAUTH_CALLBACK_BASE_URL.
#   Optional (feature degrades to no-op if unset): REDIS_URL, SENTRY_DSN,
#   ANTHROPIC_API_KEY, CLOUDINARY_*, RAZORPAY_*, LIVEKIT_*, EMAIL_*, OAuth keys.

x-base-env: &base-env
  JWT_SECRET: ${JWT_SECRET}
  CSRF_SECRET: ${CSRF_SECRET}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
  REDIS_URL: ${REDIS_URL:-}
  FRONTEND_URL: ${FRONTEND_URL}
  NODE_ENV: production
  SENTRY_DSN: ${SENTRY_DSN:-}
  IDENTITY_URL: http://identity-service:4001
  PROFILE_URL: http://profile-service:4005
  CONNECTION_URL: http://connection-service:4003
  PREMIUM_ALLOWLIST: ${PREMIUM_ALLOWLIST:-}

x-identity-env: &identity-env
  <<: *base-env
  MONGO_URI: ${MONGO_BASE}/identity
  PROFILE_URL: http://profile-service:4005
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL}
  # Set to "false" once EMAIL_USER/EMAIL_PASS are configured for real verification.
  SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-true}
  EMAIL_USER: ${EMAIL_USER:-}
  EMAIL_PASS: ${EMAIL_PASS:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
  LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}

x-profile-env: &profile-env
  <<: *base-env
  MONGO_URI: ${MONGO_BASE}/profile
  IDENTITY_URL: http://identity-service:4001
  CONNECTION_URL: http://connection-service:4003
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

x-gateway-env: &gateway-env
  <<: *base-env
  PORT: "4000"
  IDENTITY_URL: http://identity-service:4001
  PROFILE_URL: http://profile-service:4005
  NOTIFICATION_URL: http://notification-service:4010
  AI_URL: http://ai-service:4008
  JOB_URL: http://job-service:4011
  POST_URL: http://post-service:4009
  BILLING_URL: http://billing-service:4007
  CONNECTION_URL: http://connection-service:4003
  CHAT_URL: http://chat-service:4002
  GROUP_URL: http://group-service:4004
  CALL_URL: http://call-service:4006
  REALTIME_URL: http://realtime-gateway:4020

services:
  # ---- Public edge: API gateway ----
  api-gateway:
    image: ghcr.io/vindreshsingh/dc-api-gateway:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: gateway/api-gateway/Dockerfile
    environment: *gateway-env
    # For nginx reverse-proxy on the same host, change to "127.0.0.1:4000:4000"
    # so the gateway is not directly reachable from the internet.
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - identity-service
      - profile-service
    restart: unless-stopped

  # ---- Public edge: realtime (Socket.IO) gateway ----
  realtime-gateway:
    image: ghcr.io/vindreshsingh/dc-realtime-gateway:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: gateway/realtime-gateway/Dockerfile
    environment:
      <<: *base-env
      CHAT_MONGO_URI: ${MONGO_BASE}/chat
      GROUP_MONGO_URI: ${MONGO_BASE}/group
      CALL_MONGO_URI: ${MONGO_BASE}/call
      PORT: "4020"
    # For nginx reverse-proxy, change to "127.0.0.1:4020:4020".
    ports:
      - "127.0.0.1:4020:4020"
    restart: unless-stopped

  # ---- Internal services (no host ports; private Docker network only) ----
  identity-service:
    image: ghcr.io/vindreshsingh/dc-identity-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    environment:
      <<: *identity-env
      PORT: "4001"
    restart: unless-stopped

  identity-worker:
    image: ghcr.io/vindreshsingh/dc-identity-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    command: ["node", "src/worker.js"]
    environment: *identity-env
    depends_on:
      - identity-service
    restart: unless-stopped

  profile-service:
    image: ghcr.io/vindreshsingh/dc-profile-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    environment:
      <<: *profile-env
      PORT: "4005"
    depends_on:
      - connection-service
    restart: unless-stopped

  connection-service:
    image: ghcr.io/vindreshsingh/dc-connection-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/connection-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/connection
      PORT: "4003"
    restart: unless-stopped

  chat-service:
    image: ghcr.io/vindreshsingh/dc-chat-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/chat
      PORT: "4002"
    restart: unless-stopped

  group-service:
    image: ghcr.io/vindreshsingh/dc-group-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/group-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/group
      PORT: "4004"
    restart: unless-stopped

  call-service:
    image: ghcr.io/vindreshsingh/dc-call-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/call-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/call
      PORT: "4006"
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    restart: unless-stopped

  billing-service:
    image: ghcr.io/vindreshsingh/dc-billing-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/billing
      PORT: "4007"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    restart: unless-stopped

  ai-service:
    image: ghcr.io/vindreshsingh/dc-ai-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/ai
      PORT: "4008"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-20}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    restart: unless-stopped

  post-service:
    image: ghcr.io/vindreshsingh/dc-post-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/post-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/post
      PORT: "4009"
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    restart: unless-stopped

  notification-service:
    image: ghcr.io/vindreshsingh/dc-notification-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/notification
      PORT: "4010"
    restart: unless-stopped

  job-service:
    image: ghcr.io/vindreshsingh/dc-job-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    environment:
      <<: *base-env
      MONGO_URI: ${MONGO_BASE}/job
      PORT: "4011"
    restart: unless-stopped

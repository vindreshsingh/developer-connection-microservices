# Local dev stack: infra + all microservices + the gateway.
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api-gateway:
    build: ./gateway/api-gateway
    environment:
      - PORT=4000
      - JWT_SECRET=change-me
      # M1: send everything to the monolith. Override per-service as they go live.
      - MONOLITH_URL=http://host.docker.internal:3008
    ports:
      - "4000:4000"
    depends_on:
      - redis

  identity-service:
    build: ./services/identity-service
    environment:
      - PORT=4001
      - MONGO_URI=mongodb://mongo:27017/identity
      - REDIS_URL=redis://redis:6379
    ports:
      - "4001:4001"
    depends_on:
      - mongo
      - redis

  profile-service:
    build: ./services/profile-service
    environment:
      - PORT=4002
      - MONGO_URI=mongodb://mongo:27017/profile
      - REDIS_URL=redis://redis:6379
    ports:
      - "4002:4002"
    depends_on:
      - mongo
      - redis

  connection-service:
    build: ./services/connection-service
    environment:
      - PORT=4003
      - MONGO_URI=mongodb://mongo:27017/connection
      - REDIS_URL=redis://redis:6379
    ports:
      - "4003:4003"
    depends_on:
      - mongo
      - redis

  chat-service:
    build: ./services/chat-service
    environment:
      - PORT=4004
      - MONGO_URI=mongodb://mongo:27017/chat
      - REDIS_URL=redis://redis:6379
    ports:
      - "4004:4004"
    depends_on:
      - mongo
      - redis

  group-service:
    build: ./services/group-service
    environment:
      - PORT=4005
      - MONGO_URI=mongodb://mongo:27017/group
      - REDIS_URL=redis://redis:6379
    ports:
      - "4005:4005"
    depends_on:
      - mongo
      - redis

  call-service:
    build: ./services/call-service
    environment:
      - PORT=4006
      - MONGO_URI=mongodb://mongo:27017/call
      - REDIS_URL=redis://redis:6379
    ports:
      - "4006:4006"
    depends_on:
      - mongo
      - redis

  billing-service:
    build: ./services/billing-service
    environment:
      - PORT=4007
      - MONGO_URI=mongodb://mongo:27017/billing
      - REDIS_URL=redis://redis:6379
    ports:
      - "4007:4007"
    depends_on:
      - mongo
      - redis

  ai-service:
    build: ./services/ai-service
    environment:
      - PORT=4008
      - MONGO_URI=mongodb://mongo:27017/ai
      - REDIS_URL=redis://redis:6379
    ports:
      - "4008:4008"
    depends_on:
      - mongo
      - redis

  post-service:
    build: ./services/post-service
    environment:
      - PORT=4009
      - MONGO_URI=mongodb://mongo:27017/post
      - REDIS_URL=redis://redis:6379
    ports:
      - "4009:4009"
    depends_on:
      - mongo
      - redis

  notification-service:
    build: ./services/notification-service
    environment:
      - PORT=4010
      - MONGO_URI=mongodb://mongo:27017/notification
      - REDIS_URL=redis://redis:6379
    ports:
      - "4010:4010"
    depends_on:
      - mongo
      - redis

  job-service:
    build: ./services/job-service
    environment:
      - PORT=4011
      - MONGO_URI=mongodb://mongo:27017/job
      - REDIS_URL=redis://redis:6379
    ports:
      - "4011:4011"
    depends_on:
      - mongo
      - redis

volumes:
  mongo-data:
  redis-data:

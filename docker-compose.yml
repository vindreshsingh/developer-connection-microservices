# Local dev stack: infra + all microservices + the gateway.
#
# Database-per-service — fresh DBs, no monolith data migration required.
# Gateway routes extracted prefixes to services; the rest falls through to MONOLITH_URL.
x-base-env: &base-env
  JWT_SECRET: change-me
  REDIS_URL: redis://redis:6379
  FRONTEND_URL: http://localhost:5173
  NODE_ENV: development
  INTERNAL_SERVICE_TOKEN: dev-internal-token

x-identity-env: &identity-env
  <<: *base-env
  MONGO_URI: mongodb://mongo:27017/identity
  PROFILE_URL: http://profile-service:4005
  ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  OAUTH_CALLBACK_BASE_URL: http://localhost:4000
  SKIP_EMAIL_VERIFICATION: "true"

x-profile-env: &profile-env
  <<: *base-env
  MONGO_URI: mongodb://mongo:27017/profile
  IDENTITY_URL: http://identity-service:4001
  CONNECTION_URL: http://connection-service:4003

x-gateway-env: &gateway-env
  <<: *base-env
  PORT: "4000"
  MONOLITH_URL: http://host.docker.internal:3008
  IDENTITY_URL: http://identity-service:4001
  PROFILE_URL: http://profile-service:4005
  NOTIFICATION_URL: http://notification-service:4010
  AI_URL: http://ai-service:4008
  JOB_URL: http://job-service:4011
  POST_URL: http://post-service:4009
  BILLING_URL: http://billing-service:4007
  CONNECTION_URL: http://connection-service:4003
  CHAT_URL: http://chat-service:4002
  GROUP_URL: http://group-service:4004
  CALL_URL: http://call-service:4006
  REALTIME_URL: http://realtime-gateway:4020

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api-gateway:
    build: ./gateway/api-gateway
    environment: *gateway-env
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - identity-service
      - profile-service

  identity-service:
    build: ./services/identity-service
    environment:
      <<: *identity-env
      PORT: "4001"
    ports:
      - "4001:4001"
    depends_on:
      - mongo
      - redis
      - profile-service

  identity-worker:
    build: ./services/identity-service
    command: ["pnpm", "worker"]
    environment: *identity-env
    depends_on:
      - redis
      - identity-service

  profile-service:
    build: ./services/profile-service
    environment:
      <<: *profile-env
      PORT: "4005"
    ports:
      - "4005:4005"
    depends_on:
      - mongo
      - redis
      - identity-service
      - connection-service

  connection-service:
    build: ./services/connection-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/connection
      PORT: "4003"
    ports:
      - "4003:4003"
    depends_on:
      - mongo
      - redis

  chat-service:
    build: ./services/chat-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/chat
      PORT: "4002"
    ports:
      - "4002:4002"
    depends_on:
      - mongo
      - redis

  group-service:
    build: ./services/group-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/group
      PORT: "4004"
    ports:
      - "4004:4004"
    depends_on:
      - mongo
      - redis

  call-service:
    build: ./services/call-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/call
      PORT: "4006"
    ports:
      - "4006:4006"
    depends_on:
      - mongo
      - redis

  billing-service:
    build: ./services/billing-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/billing
      PORT: "4007"
    ports:
      - "4007:4007"
    depends_on:
      - mongo
      - redis

  ai-service:
    build: ./services/ai-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/ai
      PORT: "4008"
    ports:
      - "4008:4008"
    depends_on:
      - mongo
      - redis

  post-service:
    build: ./services/post-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/post
      PORT: "4009"
    ports:
      - "4009:4009"
    depends_on:
      - mongo
      - redis

  notification-service:
    build: ./services/notification-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/notification
      PORT: "4010"
    ports:
      - "4010:4010"
    depends_on:
      - mongo
      - redis

  job-service:
    build: ./services/job-service
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/job
      PORT: "4011"
    ports:
      - "4011:4011"
    depends_on:
      - mongo
      - redis

  realtime-gateway:
    build: ./gateway/realtime-gateway
    environment:
      <<: *base-env
      MONGO_URI: mongodb://mongo:27017/realtime
      PORT: "4020"
    ports:
      - "4020:4020"
    depends_on:
      - mongo
      - redis

volumes:
  mongo-data:
  redis-data:
